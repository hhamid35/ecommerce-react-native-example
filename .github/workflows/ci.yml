name: CI

on:
  push:
    branches:
      - main
      - temp_main
  pull_request:
    branches:
      - main
      - temp_main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test -- --ci

  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup EAS CLI
        run: |
          npm install -g eas-cli@latest
          eas --version
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Authenticate with EAS
        run: |
          # EAS CLI automatically uses EXPO_TOKEN environment variable
          eas whoami || {
            echo "Failed to authenticate with EAS. Please check EXPO_TOKEN secret."
            exit 1
          }
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android apps
        id: build
        run: |
          eas build --platform android --profile staging --non-interactive --json
