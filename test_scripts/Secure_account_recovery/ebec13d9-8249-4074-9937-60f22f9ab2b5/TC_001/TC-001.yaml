appId: com.abidrazaa.EasyBuy
name: "Account Recovery - Full Happy Path (D-1 through D-4)"
tags:
    - account-recovery
---

# AC 1: Launch the application
- launchApp

# AC 2: Wait for splash auto-navigation to complete
- assertVisible:
    id: "splash-screen"
- extendedWaitUntil:
    notVisible:
      id: "splash-screen"
    timeout: 30000
- assertVisible:
    id: "login-screen"

# AC 3: Tap the Forget Password link on Login screen
- evalScript: ${output.scrollAttempt = 0}
- repeat:
    times: 10
    while:
      notVisible:
        id: "login-forget-password"
    commands:
      - swipe:
          from:
            id: "login-scroll"
          direction: UP
          duration: 400
      - evalScript: ${output.scrollAttempt = output.scrollAttempt + 1}
- tapOn:
    id: "login-forget-password"
- assertVisible:
    id: "forget-password-screen"

# AC 4: Verify RecoveryStepIndicator shows step 1 (Email) as the current step
- assertVisible:
    id: "recovery-step-indicator"
- assertVisible: ".*Email.*"

# AC 5: Enter the registered user email address
- tapOn:
    id: "forget-password-email-input"
- inputText: "user@easybuy.com"
- hideKeyboard

# AC 6: Tap the Send Code button
- tapOn:
    id: "forget-password-submit-btn"
- extendedWaitUntil:
    visible:
      id: "verify-recovery-otp-screen"
    timeout: 30000

# AC 7: Verify RecoveryStepIndicator shows step 2 (Verify) as the current step
- assertVisible:
    id: "recovery-step-indicator"
- assertVisible: ".*Verify.*"

# AC 8: Verify masked email hint is displayed
- assertVisible: ".*Code sent to.*"
- assertVisible: ".*u.*@easybuy.com.*"

# AC 9: Enter the 6-digit OTP code received from the recovery request
# NOTE: devOtp is pre-filled in non-production; copy and re-enter to satisfy step
- tapOn:
    id: "verify-recovery-otp-input"
- copyTextFrom:
    id: "verify-recovery-otp-input"
- eraseText: 6
- pasteText
- hideKeyboard

# AC 10: Tap the Verify button
- tapOn:
    id: "verify-recovery-otp-submit-btn"
- extendedWaitUntil:
    visible:
      id: "recovery-reset-password-screen"
    timeout: 30000

# AC 11: Verify RecoveryStepIndicator shows step 3 (Reset) as the current step
- assertVisible:
    id: "recovery-step-indicator"
- assertVisible: ".*Reset.*"

# AC 12: Enter a new password of at least 6 characters
- tapOn:
    id: "recovery-reset-password-new-input"
- inputText: "newpass1"

# AC 13: Enter the same password in the Confirm Password field
- tapOn:
    id: "recovery-reset-password-confirm-input"
- inputText: "newpass1"
- hideKeyboard

# AC 14: Tap the Reset Password button
- tapOn:
    id: "recovery-reset-password-submit-btn"
- assertVisible: ".*Password reset successfully.*"

# AC 15: Wait for automatic redirect to Login screen
- extendedWaitUntil:
    visible:
      id: "login-screen"
    timeout: 30000
- assertVisible:
    id: "login-success-alert"
- assertVisible: ".*Password updated.*"

# AC 16: Enter email and new password, then tap Login
- tapOn:
    id: "login-email-input"
- eraseText: 20
- inputText: "user@easybuy.com"
- tapOn:
    id: "login-password-input"
- eraseText: 20
- inputText: "newpass1"
- hideKeyboard
- tapOn:
    id: "login-submit-btn"
- waitForAnimationToEnd
- extendedWaitUntil:
    notVisible:
      id: "login-screen"
    timeout: 30000
- assertVisible:
    id: "home-screen"
