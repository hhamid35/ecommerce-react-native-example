appId: com.abidrazaa.EasyBuy
name: "Successful barcode scan navigates to product detail (D-2, D-3, D-4 Happy Path)"
tags:
    - scan-barcode-success
---

# Prerequisites: logged-in shopper; camera permission granted; mock server with GAR-001; barcode test data

# AC 1: Launch the application
- launchApp
- assertVisible:
    id: "splash-screen"

# AC 2: Wait for automatic navigation from Splash to Tabs
- extendedWaitUntil:
    notVisible:
      id: "splash-screen"
    timeout: 30000
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "login-screen"
- runFlow:
    when:
      notVisible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "tab-home-icon"
      - assertVisible:
          id: "tab-categories-icon"

# Prerequisite: User is logged in as a shopper
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - tapOn:
          id: "login-email-input"
      - inputText: "user@easybuy.com"
      - tapOn:
          id: "login-password-input"
      - inputText: "user123"
      - hideKeyboard
      - tapOn:
          id: "login-submit-btn"
      - waitForAnimationToEnd
      - assertVisible:
          id: "tab-home-icon"

# AC 3: Tap the Home tab
- tapOn:
    id: "tab-home-icon"
- assertVisible:
    id: "home-screen"

# AC 4: Tap the Scan button (search-bar-scan-btn)
- tapOn:
    id: "search-bar-scan-btn"
- extendedWaitUntil:
    visible:
      id: "scan-screen"
    timeout: 30000
# Prerequisite: Camera permission is granted — wait for camera scan UI
- extendedWaitUntil:
    visible:
      id: "scan-camera-view"
    timeout: 30000
- assertVisible:
    id: "scan-camera-view"

# AC 5: Point the camera at a barcode or QR code encoding SKU GAR-001
# NOTE: Android — inject barcode via Maestro camera mock; physical iOS requires on-screen QR target
- camera:
    barcode: "GAR-001"
- assertVisible: ".*Looking up product.*"

# AC 6: Wait for lookup to complete
- extendedWaitUntil:
    visible:
      id: "product-detail-screen"
    timeout: 30000
- waitForAnimationToEnd
- assertVisible:
    id: "product-detail-screen"

# AC 7: Verify product detail content matches the scanned catalog item (SKU GAR-001)
- assertVisible:
    id: "product-detail-title"
- assertVisible: ".*Classic White T-Shirt.*"
- assertVisible:
    id: "product-detail-price"
- assertVisible: ".*19\\.99.*"
