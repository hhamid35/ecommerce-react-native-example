appId: com.abidrazaa.EasyBuy
name: "Out-of-stock matched product still opens product detail (D-4 Edge)"
tags:
    - scan-out-of-stock
---

# Prerequisites: logged-in shopper; camera permission granted; mock server with out-of-stock SKU; barcode test data

# AC 1: Launch the application
- launchApp
- assertVisible:
    id: "splash-screen"

# AC 2: Wait for automatic navigation from Splash to Tabs
- extendedWaitUntil:
    notVisible:
      id: "splash-screen"
    timeout: 30000
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "login-screen"
- runFlow:
    when:
      notVisible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "tab-home-icon"
      - assertVisible:
          id: "tab-categories-icon"

# Prerequisite: User is logged in as a shopper
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - tapOn:
          id: "login-email-input"
      - inputText: "user@easybuy.com"
      - tapOn:
          id: "login-password-input"
      - inputText: "user123"
      - hideKeyboard
      - tapOn:
          id: "login-submit-btn"
      - waitForAnimationToEnd
      - assertVisible:
          id: "tab-home-icon"

# AC 3: Tap the Home tab
- tapOn:
    id: "tab-home-icon"
- assertVisible:
    id: "home-screen"

# AC 4: Tap the Scan button (search-bar-scan-btn)
- tapOn:
    id: "search-bar-scan-btn"
- extendedWaitUntil:
    visible:
      id: "scan-screen"
    timeout: 30000
# Prerequisite: Camera permission is granted — wait for camera scan UI
- extendedWaitUntil:
    visible:
      id: "scan-camera-view"
    timeout: 30000
- assertVisible:
    id: "scan-camera-view"

# AC 5: Scan the barcode or QR code for the out-of-stock product SKU
# NOTE: Android — inject barcode via sub-flow camera mock; physical iOS requires on-screen QR target
- runFlow:
    file: scan-inject-barcode.yaml
    env:
      BARCODE: ${out_of_stock_sku}

# AC 5: ProductDetailScreen is displayed for the matched product
- extendedWaitUntil:
    visible:
      id: "product-detail-screen"
    timeout: 30000
- waitForAnimationToEnd
- assertVisible:
    id: "product-detail-screen"

# AC 6: Verify out-of-stock UI on product detail
- assertVisible:
    id: "product-detail-out-of-stock-btn"
- assertVisible: ".*Out of Stock.*"
- assertNotVisible:
    id: "product-detail-add-to-cart-btn"
