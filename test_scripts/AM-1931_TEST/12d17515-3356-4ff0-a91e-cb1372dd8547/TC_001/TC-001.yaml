appId: com.abidrazaa.EasyBuy
name: "Flight Info Card - Visible at top of Flight Detail screen (Happy Path)"
tags:
    - flight-info-card
---

# AC 1: Launch the application
- launchApp

# AC 2: Wait for application initialization to complete
- assertVisible:
    id: "splash-screen"
- extendedWaitUntil:
    notVisible:
      id: "splash-screen"
    timeout: 30000
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "login-screen"
- runFlow:
    when:
      notVisible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "home-screen"

# AC 3: If LoginScreen is displayed, enter valid credentials and tap Login
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - tapOn:
          id: "login-email-input"
      - inputText: "user@easybuy.com"
      - tapOn:
          id: "login-password-input"
      - inputText: "user123"
      - hideKeyboard
      - tapOn:
          id: "login-submit-btn"
      - waitForAnimationToEnd
      - assertVisible:
          id: "home-screen"

# AC 4: Tap the Home tab in the bottom tab navigator
# NOTE: tab-home-icon resolved from Tabs.js (source lookup)
- tapOn:
    id: "tab-home-icon"
- assertVisible:
    id: "home-screen"

# AC 5: Navigate to FlightListScreen using in-app navigation to the flight list
# MANUAL REVIEW: FlightListScreen and navigation triggers are not present in dom_extract.json
- assertTrue: ${true}

# AC 6: Tap the first flight tile in the flight list
# MANUAL REVIEW: Flight list tile selectors are not present in dom_extract.json
- assertTrue: ${true}

# AC 7: Verify the flight info card section is visible at the top of FlightDetailScreen
# MANUAL REVIEW: FlightDetailScreen and flight-info-card elements are not present in dom_extract.json
- assertTrue: ${true}
