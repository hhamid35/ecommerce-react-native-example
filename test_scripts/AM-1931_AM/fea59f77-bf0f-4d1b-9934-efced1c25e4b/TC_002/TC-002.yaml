appId: com.abidrazaa.EasyBuy
name: "Flight Info Card - Operating carrier, flight number, and departure date mapping"
tags:
    - flight-info-card-mapping
---

# Prerequisites: airlineCode, flightNumber, date from getFlight API supplied via test execution env

# AC 1: Launch the application
- launchApp

# AC 2: Wait for application initialization to complete
- assertVisible:
    id: "splash-screen"
- extendedWaitUntil:
    notVisible:
      id: "splash-screen"
    timeout: 30000
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "login-screen"
- runFlow:
    when:
      notVisible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "home-screen"

# AC 3: If LoginScreen is displayed, enter valid credentials and tap Login
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - tapOn:
          id: "login-email-input"
      - inputText: "user@easybuy.com"
      - tapOn:
          id: "login-password-input"
      - inputText: "user123"
      - hideKeyboard
      - tapOn:
          id: "login-submit-btn"
      - waitForAnimationToEnd
      - assertVisible:
          id: "home-screen"

# AC 4: Tap the Home tab in the bottom tab navigator
# NOTE: tab-home-icon resolved from Tabs.js (source lookup)
- tapOn:
    id: "tab-home-icon"
- assertVisible:
    id: "home-screen"

# AC 5: Navigate to FlightListScreen using in-app navigation to the flight list
# MANUAL REVIEW: FlightListScreen and navigation triggers are not present in dom_extract.json
- assertTrue: ${true}

# AC 6: Tap the first flight tile in the flight list
# MANUAL REVIEW: Flight list tile selectors are not present in dom_extract.json
- assertTrue: ${true}

# AC 7: Verify the operating carrier code on the flight info card
# MANUAL REVIEW: flight-info-card elements are not present in dom_extract.json; asserting airlineCode text from getFlight response
- assertVisible: ".*${airlineCode}.*"

# AC 8: Verify the flight number on the flight info card
# MANUAL REVIEW: flight-info-card elements are not present in dom_extract.json; asserting flightNumber text from getFlight response
- assertVisible: ".*${flightNumber}.*"

# AC 9: Verify the departure date on the flight info card
# MANUAL REVIEW: flight-info-card elements are not present in dom_extract.json; asserting date text from getFlight response
- assertVisible: ".*${date}.*"