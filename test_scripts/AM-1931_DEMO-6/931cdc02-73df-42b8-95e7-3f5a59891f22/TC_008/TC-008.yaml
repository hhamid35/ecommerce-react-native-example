appId: com.abidrazaa.EasyBuy
name: "Flight Info Card - Detailed status labels OUT DEP ON ARR"
tags:
    - flight-info-card-detailed-status
    - out-dep-on-arr
---

# Prerequisites: User is logged in; flights with detailedStatusCode OUT, DEP, ON, and ARR exist and are accessible via the flight list; flight data available from getFlight query API

# AC 1: Launch the application
- launchApp
- assertVisible:
    id: "splash-screen"

# AC 2: Wait for application initialization to complete
- extendedWaitUntil:
    notVisible:
      id: "splash-screen"
    timeout: 30000
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "login-screen"
- runFlow:
    when:
      notVisible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "tab-home-icon"
      - assertVisible:
          id: "tab-categories-icon"

# Prerequisite: User is logged in to the application
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - tapOn:
          id: "login-email-input"
      - inputText: "user@easybuy.com"
      - tapOn:
          id: "login-password-input"
      - inputText: "user123"
      - hideKeyboard
      - tapOn:
          id: "login-submit-btn"
      - waitForAnimationToEnd
      - assertVisible:
          id: "tab-home-icon"

# AC 2 continued: Tabs navigator is displayed with the bottom tab bar visible
# NOTE: tab icons resolved from Tabs.js (source lookup)
- assertVisible:
    id: "tab-home-icon"
- assertVisible:
    id: "tab-categories-icon"

# AC 3: Tap the Home tab in the bottom tab navigator
- tapOn:
    id: "tab-home-icon"
- assertVisible:
    id: "home-screen"
- assertVisible:
    id: "home-scroll"

# AC 4: Open a flight with detailedStatusCode OUT and verify the detailed status label
# MANUAL REVIEW: Flight list tile selectors are not present in dom_extract.json; scrolling to locate a tile showing OUT detailed status
- evalScript: ${output.scrollAttempt = 0}
- repeat:
    times: 10
    while:
      notVisible: ".*OUT.*"
    commands:
      - swipe:
          from:
            id: "home-scroll"
          direction: UP
          duration: 400
      - evalScript: ${output.scrollAttempt = output.scrollAttempt + 1}
- assertVisible: ".*OUT.*"
- tapOn:
    text: ".*OUT.*"
    below:
      id: "home-header"
    index: 0
- waitForAnimationToEnd
# MANUAL REVIEW: ProductDetailScreen used as flight detail screen; flight info card elements not in dom_extract.json
- assertVisible:
    id: "product-detail-screen"
# MANUAL REVIEW: flight-info-card detailed status label testID is not present in dom_extract.json
- assertVisible: ".*Left gate.*"

# AC 5: Return to HomeScreen, open a flight with detailedStatusCode DEP, and verify the detailed status label
- tapOn:
    id: "product-detail-back-btn"
- waitForAnimationToEnd
- assertVisible:
    id: "home-screen"
- assertVisible:
    id: "home-scroll"
- evalScript: ${output.scrollAttempt = 0}
- repeat:
    times: 10
    while:
      notVisible: ".*DEP.*"
    commands:
      - swipe:
          from:
            id: "home-scroll"
          direction: UP
          duration: 400
      - evalScript: ${output.scrollAttempt = output.scrollAttempt + 1}
- assertVisible: ".*DEP.*"
- tapOn:
    text: ".*DEP.*"
    below:
      id: "home-header"
    index: 0
- waitForAnimationToEnd
- assertVisible:
    id: "product-detail-screen"
# MANUAL REVIEW: flight-info-card detailed status label testID is not present in dom_extract.json
- assertVisible: ".*In flight.*"

# AC 6: Return to HomeScreen, open a flight with detailedStatusCode ON, and verify the detailed status label
- tapOn:
    id: "product-detail-back-btn"
- waitForAnimationToEnd
- assertVisible:
    id: "home-screen"
- assertVisible:
    id: "home-scroll"
- evalScript: ${output.scrollAttempt = 0}
- repeat:
    times: 10
    while:
      notVisible: ".*ON.*"
    commands:
      - swipe:
          from:
            id: "home-scroll"
          direction: UP
          duration: 400
      - evalScript: ${output.scrollAttempt = output.scrollAttempt + 1}
- assertVisible: ".*ON.*"
- tapOn:
    text: ".*ON.*"
    below:
      id: "home-header"
    index: 0
- waitForAnimationToEnd
- assertVisible:
    id: "product-detail-screen"
# MANUAL REVIEW: flight-info-card detailed status label testID is not present in dom_extract.json
- assertVisible: ".*Landed.*"

# AC 7: Return to HomeScreen, open a flight with detailedStatusCode ARR, and verify the detailed status label
- tapOn:
    id: "product-detail-back-btn"
- waitForAnimationToEnd
- assertVisible:
    id: "home-screen"
- assertVisible:
    id: "home-scroll"
- evalScript: ${output.scrollAttempt = 0}
- repeat:
    times: 10
    while:
      notVisible: ".*ARR.*"
    commands:
      - swipe:
          from:
            id: "home-scroll"
          direction: UP
          duration: 400
      - evalScript: ${output.scrollAttempt = output.scrollAttempt + 1}
- assertVisible: ".*ARR.*"
- tapOn:
    text: ".*ARR.*"
    below:
      id: "home-header"
    index: 0
- waitForAnimationToEnd
- assertVisible:
    id: "product-detail-screen"
# MANUAL REVIEW: flight-info-card detailed status label testID is not present in dom_extract.json
- assertVisible: ".*Arrived at gate.*"
