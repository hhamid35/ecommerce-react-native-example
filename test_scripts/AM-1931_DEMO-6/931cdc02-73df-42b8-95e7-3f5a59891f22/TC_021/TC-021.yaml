appId: com.abidrazaa.EasyBuy
name: "Flight Info Card - No relative times when detailedStatusCode CNL"
tags:
    - flight-info-card-relative-times
    - cnl
---

# Prerequisites: User is logged in; a flight with detailedStatusCode CNL exists in the flight list; flight data available from getFlight query API

# AC 1: Launch the application
- launchApp
- assertVisible:
    id: "splash-screen"

# AC 2: Wait for application initialization to complete
- extendedWaitUntil:
    notVisible:
      id: "splash-screen"
    timeout: 30000
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "login-screen"
- runFlow:
    when:
      notVisible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "tab-home-icon"
      - assertVisible:
          id: "tab-categories-icon"

# Prerequisite: User is logged in to the application
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - tapOn:
          id: "login-email-input"
      - inputText: "user@easybuy.com"
      - tapOn:
          id: "login-password-input"
      - inputText: "user123"
      - hideKeyboard
      - tapOn:
          id: "login-submit-btn"
      - waitForAnimationToEnd
      - assertVisible:
          id: "tab-home-icon"

# AC 2 continued: Tabs navigator is displayed with the bottom tab bar visible
# NOTE: tab icons resolved from Tabs.js (source lookup)
- assertVisible:
    id: "tab-home-icon"
- assertVisible:
    id: "tab-categories-icon"

# AC 3: Tap the Home tab in the bottom tab navigator
- tapOn:
    id: "tab-home-icon"
- assertVisible:
    id: "home-screen"
- assertVisible:
    id: "home-scroll"

# AC 4: Tap a flight tile whose getFlight detailedStatusCode is CNL
# MANUAL REVIEW: Flight list tile selectors are not present in dom_extract.json; scrolling to locate a tile showing CNL detailed status
- evalScript: ${output.scrollAttempt = 0}
- repeat:
    times: 10
    while:
      notVisible: ".*CNL.*"
    commands:
      - swipe:
          from:
            id: "home-scroll"
          direction: UP
          duration: 400
      - evalScript: ${output.scrollAttempt = output.scrollAttempt + 1}
- assertVisible: ".*CNL.*"
- tapOn:
    text: ".*CNL.*"
    below:
      id: "home-header"
    index: 0
- waitForAnimationToEnd
# MANUAL REVIEW: ProductDetailScreen used as flight detail screen; flight info card elements not in dom_extract.json
- assertVisible:
    id: "product-detail-screen"
- assertVisible:
    id: "product-detail-image"

# AC 5: Verify relative time labels for origin and destination on the flight info card
# MANUAL REVIEW: flight-info-card relative time testIDs are not present in dom_extract.json; asserting absence of relative time label patterns per acceptance criteria when detailedStatusCode is CNL
- assertNotVisible: ".*departing in [0-9]+h [0-9]+m.*"
- assertNotVisible: ".*departed [0-9]+h [0-9]+m ago.*"
- assertNotVisible: ".*arriving in [0-9]+h [0-9]+m.*"
- assertNotVisible: ".*arrived [0-9]+h [0-9]+m ago.*"
