appId: com.abidrazaa.EasyBuy
name: "Flight Info Card - ETD equals STD no strikethrough"
tags:
    - flight-info-card-etd-equals-std-no-strikethrough
---

# Prerequisites: User is logged in; std_local from getFlight API supplied via test execution env; a flight exists where ETD equals STD or estimatedDateTime is not provided

# AC 1: Launch the application
- launchApp
- assertVisible:
    id: "splash-screen"

# AC 2: Wait for application initialization to complete
- extendedWaitUntil:
    notVisible:
      id: "splash-screen"
    timeout: 30000
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "login-screen"
- runFlow:
    when:
      notVisible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "tab-home-icon"
      - assertVisible:
          id: "tab-categories-icon"

# Prerequisite: User is logged in to the application
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - tapOn:
          id: "login-email-input"
      - inputText: "user@easybuy.com"
      - tapOn:
          id: "login-password-input"
      - inputText: "user123"
      - hideKeyboard
      - tapOn:
          id: "login-submit-btn"
      - waitForAnimationToEnd
      - assertVisible:
          id: "tab-home-icon"

# AC 2 continued: Tabs navigator is displayed with the bottom tab bar visible
# NOTE: tab icons resolved from Tabs.js (source lookup)
- assertVisible:
    id: "tab-home-icon"
- assertVisible:
    id: "tab-categories-icon"

# AC 3: Tap the Home tab in the bottom tab navigator
- tapOn:
    id: "tab-home-icon"
- assertVisible:
    id: "home-screen"
- assertVisible:
    id: "home-scroll"

# AC 4: Tap a flight tile whose getFlight origin ETD equals STD or has no estimatedDateTime
- extendedWaitUntil:
    notVisible:
      id: "new-arrivals-empty"
    timeout: 30000
- evalScript: ${output.scrollAttempt = 0}
- repeat:
    times: 10
    while:
      notVisible:
        id: "new-arrivals-product-1"
    commands:
      - swipe:
          from:
            id: "home-scroll"
          direction: UP
          duration: 400
      - evalScript: ${output.scrollAttempt = output.scrollAttempt + 1}
# MANUAL REVIEW: Flight list tile selectors are not present in dom_extract.json; using new-arrivals-product-1 as flight tile proxy for flight where ETD equals STD or estimatedDateTime is unavailable
- tapOn:
    id: "new-arrivals-product-1"
    below:
      id: "new-arrivals-heading"
    index: 0
- waitForAnimationToEnd
- assertVisible:
    id: "product-detail-screen"
# MANUAL REVIEW: flight-info-card elements are not present in dom_extract.json; asserting product-detail-image as flight info card visibility proxy
- assertVisible:
    id: "product-detail-image"

# AC 5: Verify departure STD display on the flight info card
# MANUAL REVIEW: flight-info-card strikethrough styling cannot be verified directly by Maestro; validating test data precondition that ETD equals STD or estimatedDateTime is not provided
- evalScript: ${output.stdLocal = String("${std_local}"); output.etdLocal = String("${etd_local}"); output.etdEqualsStdOrMissing = output.etdLocal === "" || output.etdLocal === "undefined" || output.etdLocal === output.stdLocal;}
- assertTrue: ${output.etdEqualsStdOrMissing}

# MANUAL REVIEW: flight-info-card elements are not present in dom_extract.json; asserting flightInfo.origin.scheduledDateTime.local from getFlight response is displayed without duplicate ETD-with-strikethrough pattern
- assertVisible: ".*${std_local}.*"
