appId: com.abidrazaa.EasyBuy
name: "Flight Info Card - Early status label green (overallStatusCode EAR)"
tags:
    - flight-info-card-early-status
---

# Prerequisites: REQUIRES TEST DATA; User logged in; EAR flight accessible; origin_time and destination_time from getFlight API supplied via test execution env

# AC 1: Launch the application
- launchApp
- assertVisible:
    id: "splash-screen"

# AC 2: Wait for application initialization to complete
- extendedWaitUntil:
    notVisible:
      id: "splash-screen"
    timeout: 30000
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "login-screen"
- runFlow:
    when:
      notVisible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "tab-home-icon"
      - assertVisible:
          id: "tab-categories-icon"

# Prerequisite: User is logged in to the application
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - tapOn:
          id: "login-email-input"
      - inputText: "user@easybuy.com"
      - tapOn:
          id: "login-password-input"
      - inputText: "user123"
      - hideKeyboard
      - tapOn:
          id: "login-submit-btn"
      - waitForAnimationToEnd
      - assertVisible:
          id: "tab-home-icon"

# AC 2 continued: Tabs navigator is displayed with the bottom tab bar visible
# NOTE: tab icons resolved from Tabs.js (source lookup)
- assertVisible:
    id: "tab-home-icon"
- assertVisible:
    id: "tab-categories-icon"

# AC 3: Tap the Home tab in the bottom tab navigator
- tapOn:
    id: "tab-home-icon"
- assertVisible:
    id: "home-screen"
- assertVisible:
    id: "home-scroll"

# AC 4: Tap a flight tile in the list whose getFlight overallStatusCode is EAR
# MANUAL REVIEW: Flight list tile selectors are not present in dom_extract.json; scrolling to find Early status label
- evalScript: ${output.scrollAttempt = 0}
- repeat:
    times: 10
    while:
      notVisible: ".*Early.*"
    commands:
      - swipe:
          from:
            id: "home-scroll"
          direction: UP
          duration: 400
      - evalScript: ${output.scrollAttempt = output.scrollAttempt + 1}
- tapOn:
    text: ".*Early.*"
    below:
      id: "home-header"
    index: 0
- waitForAnimationToEnd
# MANUAL REVIEW: ProductDetailScreen used as flight detail screen; flight info card elements not in dom_extract.json
- assertVisible:
    id: "product-detail-screen"

# AC 5: Verify the overall status label on the flight info card
# MANUAL REVIEW: flight-info-card status elements are not present in dom_extract.json; green styling cannot be verified via Maestro
- assertVisible: ".*Early.*"

# AC 6: Verify origin and destination times on the flight info card
# MANUAL REVIEW: flight-info-card time elements are not present in dom_extract.json; green styling cannot be verified via Maestro; asserting times from getFlight response
- assertVisible: ".*${origin_time}.*"
- assertVisible: ".*${destination_time}.*"
