appId: com.abidrazaa.EasyBuy
name: "Flight Info Card - Baggage carousel when available"
tags:
    - flight-info-card-baggage-carousel
---

# Prerequisites: User is logged in; baggage_carousel from flightInfo.destination.baggageCarousel via getFlight API supplied via test execution env

# AC 1: Launch the application
- launchApp
- assertVisible:
    id: "splash-screen"

# AC 2: Wait for application initialization to complete
- extendedWaitUntil:
    notVisible:
      id: "splash-screen"
    timeout: 30000
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "login-screen"
- runFlow:
    when:
      notVisible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "tab-home-icon"
      - assertVisible:
          id: "tab-categories-icon"

# Prerequisite: User is logged in to the application
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - tapOn:
          id: "login-email-input"
      - inputText: "user@easybuy.com"
      - tapOn:
          id: "login-password-input"
      - inputText: "user123"
      - hideKeyboard
      - tapOn:
          id: "login-submit-btn"
      - waitForAnimationToEnd
      - assertVisible:
          id: "home-screen"
      - assertVisible:
          id: "tab-home-icon"

# AC 2 continued: Tabs navigator is displayed with the bottom tab bar visible
# NOTE: tab icons resolved from Tabs.js (source lookup)
- assertVisible:
    id: "tab-home-icon"
- assertVisible:
    id: "tab-categories-icon"

# AC 3: Tap the Home tab in the bottom tab navigator
- tapOn:
    id: "tab-home-icon"
- assertVisible:
    id: "home-screen"
- assertVisible:
    id: "home-scroll"

# AC 4: Tap a flight tile whose getFlight response includes flightInfo.destination.baggageCarousel
- extendedWaitUntil:
    notVisible:
      id: "new-arrivals-empty"
    timeout: 30000
- evalScript: ${output.scrollAttempt = 0}
- repeat:
    times: 10
    while:
      notVisible:
        id: "new-arrivals-product-0"
    commands:
      - swipe:
          from:
            id: "home-scroll"
          direction: UP
          duration: 400
      - evalScript: ${output.scrollAttempt = output.scrollAttempt + 1}
- assertNotVisible:
    id: "new-arrivals-empty"
# MANUAL REVIEW: Flight list tile selectors are not present in dom_extract.json; using new-arrivals-product-0 as flight tile proxy
- tapOn:
    id: "new-arrivals-product-0"
    below:
      id: "new-arrivals-heading"
    index: 0
- waitForAnimationToEnd
# MANUAL REVIEW: ProductDetailScreen used as flight detail screen; flight info card elements not in dom_extract.json
- assertVisible:
    id: "product-detail-screen"
# MANUAL REVIEW: flight-info-card elements are not present in dom_extract.json; asserting product-detail-image as flight info card visibility proxy
- assertVisible:
    id: "product-detail-image"

# AC 5: Verify the baggage carousel on the flight info card
# MANUAL REVIEW: flight-info-card baggage carousel element not in dom_extract.json; asserting baggage_carousel from flightInfo.destination.baggageCarousel via getFlight response
- assertVisible: ".*${baggage_carousel}.*"
