appId: com.abidrazaa.EasyBuy
name: "Flight Info Card - Detailed status labels SKD and ETD"
tags:
    - flight-info-card-detailed-status
    - skd-etd
---

# Prerequisites: User is logged in; flights with detailedStatusCode SKD and ETD exist and are accessible via the flight list; flight data available from getFlight query API

# AC 1: Launch the application
- launchApp
- assertVisible:
    id: "splash-screen"

# AC 2: Wait for application initialization to complete
- extendedWaitUntil:
    notVisible:
      id: "splash-screen"
    timeout: 30000
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "login-screen"
- runFlow:
    when:
      notVisible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "tab-home-icon"
      - assertVisible:
          id: "tab-categories-icon"

# Prerequisite: User is logged in to the application
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - tapOn:
          id: "login-email-input"
      - inputText: "user@easybuy.com"
      - tapOn:
          id: "login-password-input"
      - inputText: "user123"
      - hideKeyboard
      - tapOn:
          id: "login-submit-btn"
      - waitForAnimationToEnd
      - assertVisible:
          id: "tab-home-icon"

# AC 2 continued: Tabs navigator is displayed with the bottom tab bar visible
# NOTE: tab icons resolved from Tabs.js (source lookup)
- assertVisible:
    id: "tab-home-icon"
- assertVisible:
    id: "tab-categories-icon"

# AC 3: Tap the Home tab in the bottom tab navigator
- tapOn:
    id: "tab-home-icon"
- assertVisible:
    id: "home-screen"
- assertVisible:
    id: "home-scroll"

# AC 4: Tap a flight tile whose getFlight detailedStatusCode is SKD
# MANUAL REVIEW: Flight list tile selectors are not present in dom_extract.json; scrolling to locate a tile showing SKD detailed status
- evalScript: ${output.scrollAttempt = 0}
- repeat:
    times: 10
    while:
      notVisible: ".*SKD.*"
    commands:
      - swipe:
          from:
            id: "home-scroll"
          direction: UP
          duration: 400
      - evalScript: ${output.scrollAttempt = output.scrollAttempt + 1}
- assertVisible: ".*SKD.*"
- tapOn:
    text: ".*SKD.*"
    below:
      id: "home-header"
    index: 0
- waitForAnimationToEnd
# MANUAL REVIEW: ProductDetailScreen used as flight detail screen; flight info card elements not in dom_extract.json
- assertVisible:
    id: "product-detail-screen"

# AC 5: Verify the detailed status label on the flight info card displays SKD
# MANUAL REVIEW: flight-info-card detailed status label testID is not present in dom_extract.json
- assertVisible: ".*SKD.*"

# AC 6: Navigate back to HomeScreen and tap a flight tile whose getFlight detailedStatusCode is ETD
- tapOn:
    id: "product-detail-back-btn"
- waitForAnimationToEnd
- assertVisible:
    id: "home-screen"
- assertVisible:
    id: "home-scroll"
- evalScript: ${output.scrollAttempt = 0}
- repeat:
    times: 10
    while:
      notVisible: ".*ETD.*"
    commands:
      - swipe:
          from:
            id: "home-scroll"
          direction: UP
          duration: 400
      - evalScript: ${output.scrollAttempt = output.scrollAttempt + 1}
- assertVisible: ".*ETD.*"
- tapOn:
    text: ".*ETD.*"
    below:
      id: "home-header"
    index: 0
- waitForAnimationToEnd
- assertVisible:
    id: "product-detail-screen"

# AC 7: Verify the detailed status label on the flight info card displays ETD
# MANUAL REVIEW: flight-info-card detailed status label testID is not present in dom_extract.json
- assertVisible: ".*ETD.*"
