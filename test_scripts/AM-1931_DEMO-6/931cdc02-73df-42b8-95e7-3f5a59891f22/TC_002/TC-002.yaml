appId: com.abidrazaa.EasyBuy
name: "Flight Info Card - Core flight identifiers mapped from getFlight"
tags:
    - flight-info-card-core-identifiers
---

# Prerequisites: airlineCode, flightNumber, date, originCode, destinationCode from getFlight API supplied via test execution env

# AC 1: Launch the application
- launchApp
- assertVisible:
    id: "splash-screen"

# AC 2: Wait for application initialization to complete
- extendedWaitUntil:
    notVisible:
      id: "splash-screen"
    timeout: 30000
- waitForAnimationToEnd
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "login-screen"
- runFlow:
    when:
      notVisible:
        id: "login-screen"
    commands:
      - assertVisible:
          id: "tab-home-icon"
      - assertVisible:
          id: "tab-categories-icon"

# Prerequisite: User is logged in to the application
- runFlow:
    when:
      visible:
        id: "login-screen"
    commands:
      - tapOn:
          id: "login-email-input"
      - inputText: "user@easybuy.com"
      - tapOn:
          id: "login-password-input"
      - inputText: "user123"
      - hideKeyboard
      - tapOn:
          id: "login-submit-btn"
      - waitForAnimationToEnd
      - assertVisible:
          id: "tab-home-icon"

# AC 2 continued: Tabs navigator is displayed with the bottom tab bar visible
# NOTE: tab icons resolved from Tabs.js (source lookup)
- assertVisible:
    id: "tab-home-icon"
- assertVisible:
    id: "tab-categories-icon"

# AC 3: Tap the Home tab in the bottom tab navigator
- tapOn:
    id: "tab-home-icon"
- assertVisible:
    id: "home-screen"
- assertVisible:
    id: "home-scroll"

# AC 4: Tap the first flight tile in the list on HomeScreen
# MANUAL REVIEW: Flight list tile selectors are not present in dom_extract.json; using new-arrivals-product-0 as list item proxy
- extendedWaitUntil:
    notVisible:
      id: "new-arrivals-empty"
    timeout: 30000
- evalScript: ${output.scrollAttempt = 0}
- repeat:
    times: 10
    while:
      notVisible:
        id: "new-arrivals-product-0"
    commands:
      - swipe:
          from:
            id: "home-scroll"
          direction: UP
          duration: 400
      - evalScript: ${output.scrollAttempt = output.scrollAttempt + 1}
- tapOn:
    id: "new-arrivals-product-0"
    below:
      id: "new-arrivals-heading"
    index: 0
- waitForAnimationToEnd
- assertVisible:
    id: "product-detail-screen"
# MANUAL REVIEW: flight-info-card elements are not present in dom_extract.json; asserting product-detail-image as top content proxy
- assertVisible:
    id: "product-detail-image"

# AC 5: Verify the operating carrier code displayed on the flight info card
# MANUAL REVIEW: flight-info-card elements are not present in dom_extract.json; asserting airlineCode from getFlight response
- assertVisible: ".*${airlineCode}.*"

# AC 6: Verify the flight number displayed on the flight info card
# MANUAL REVIEW: flight-info-card elements are not present in dom_extract.json; asserting flightNumber from getFlight response
- assertVisible: ".*${flightNumber}.*"

# AC 7: Verify the departure date displayed on the flight info card
# MANUAL REVIEW: flight-info-card elements are not present in dom_extract.json; asserting date from getFlight response
- assertVisible: ".*${date}.*"

# AC 8: Verify the origin and destination airport codes on the flight info card
# MANUAL REVIEW: flight-info-card elements are not present in dom_extract.json; asserting originCode from getFlight response
- assertVisible: ".*${originCode}.*"
# MANUAL REVIEW: flight-info-card elements are not present in dom_extract.json; asserting destinationCode from getFlight response
- assertVisible: ".*${destinationCode}.*"
